<script>

/* TERMINAL */

let text="Accessing Tphat Hacker Hub...";
let i=0;

function type(){
if(i<text.length){
document.getElementById("terminal").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

/* MATRIX SMOOTH */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="アカサタナハマヤラワ0123456789";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

function draw(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

requestAnimationFrame(draw);

}

draw();

/* COUNTER */

let views=localStorage.getItem("views");
if(!views){views=0;}
views++;
localStorage.setItem("views",views);
document.getElementById("views").innerText=views;

/* LINK */

function go(link){

let bar=document.getElementById("bar");
let time=document.getElementById("time");

load.style.display="flex";

let t=5;
let p=0;

let timer=setInterval(()=>{

t--;
time.innerText=t;

if(t<=0){
clearInterval(timer);
window.open(link,"_blank");
load.style.display="none";
bar.style.width="0%";
}

},1000);

let progress=setInterval(()=>{

p+=2;
bar.style.width=p+"%";

if(p>=100) clearInterval(progress);

},100);

}
